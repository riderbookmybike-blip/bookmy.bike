name: SOT Parity Gate

# Mandatory Playwright parity test gate
# Runs on every PR to main/develop and on direct push to main.
# PR merge is BLOCKED until this passes.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: parity-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity-tests:
    name: Store SOT Parity (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Point Playwright at the dev server started in CI
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      # Required by the app (anon key — safe to expose in CI)
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start server (background)
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run SOT Parity tests (mandatory gate)
        run: npx playwright test tests/store-sot-parity.spec.ts --project=desktop-chrome --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
