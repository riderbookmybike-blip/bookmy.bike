name: E2E Mutations (Non-Blocking)

# Mutation tests for AUMS Dealer Offer Override.
# Requires SUPABASE_SERVICE_ROLE_KEY secret. Non-blocking until stable in CI.
# Runs on:
#   - Manual trigger (workflow_dispatch) for on-demand validation
#   - Nightly at 02:30 IST (21:00 UTC) against main
#
# TODO: remove continue-on-error once SUPABASE_SERVICE_ROLE_KEY is confirmed
#       stable in the CI environment, then add this job to branch protection rules.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test against (default: main)'
        required: false
        default: main
  schedule:
    - cron: '0 21 * * *' # 21:00 UTC = 02:30 IST

concurrency:
  group: e2e-mutations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-mutations:
    name: e2e-mutations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Non-blocking: failures notify but do not prevent merges.
    # Flip to false once SUPABASE_SERVICE_ROLE_KEY is stable in CI.
    continue-on-error: true

    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Start server (background)
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Check service role key is present
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY is not set — mutation tests will be skipped by the spec"
          else
            echo "Service role key present ✓"
          fi

      - name: Run mutation tests
        run: npx playwright test tests/aums-dealer-offer-override-mutations.spec.ts --project=desktop-chrome --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-mutations-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
