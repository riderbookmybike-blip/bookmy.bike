name: E2E Smoke (Required)

# Lightweight quality gate: lint + build.
# Replaces the Dealer Offer Override Playwright spec (removed 2026-03-19).
# PR merge is BLOCKED until this passes.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Playwright spec list (no missing files)
        run: npx playwright test --list
